<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mnstrworm × Mnstrbait</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #202020;
    --border: rgba(255,255,255,0.08);
    --accent: #ff2d55;
    --accent2: #ff6b81;
    --text: #f0f0f0;
    --muted: rgba(240,240,240,0.38);
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .container { width: 100%; max-width: 560px; }

  .eyebrow {
    font-size: 11px; font-weight: 500; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--accent);
    display: block; margin-bottom: 8px;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 60px; line-height: 0.88;
    margin-bottom: 10px;
  }
  h1 .x { color: var(--accent); font-size: 48px; }
  .subtitle { font-size: 14px; color: var(--muted); font-weight: 300; margin-bottom: 2rem; }

  .section-label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 8px; display: block;
  }

  .filter-section { margin-bottom: 1.25rem; }

  .pill-row { display: flex; flex-wrap: wrap; gap: 6px; }

  .pill {
    font-size: 13px; font-weight: 400;
    padding: 6px 16px; border-radius: 999px;
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer; transition: all 0.15s;
    user-select: none;
  }
  .pill:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .pill.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .spin-btn {
    width: 100%; padding: 18px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 0.08em;
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius);
    cursor: pointer; transition: transform 0.1s, opacity 0.15s;
    margin-bottom: 1.5rem; margin-top: 0.5rem;
  }
  .spin-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .spin-btn:active { transform: scale(0.98); }
  .spin-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

  .slot-machine {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    min-height: 170px;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem 1.5rem;
    overflow: hidden; transition: border-color 0.3s;
  }
  .slot-machine.lit { border-color: rgba(255,45,85,0.35); }
  .slot-inner { text-align: center; width: 100%; }

  .result-tags { display: flex; gap: 6px; justify-content: center; margin-bottom: 14px; flex-wrap: wrap; }
  .tag {
    display: inline-block; font-size: 10px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 3px 10px; border-radius: 999px;
  }
  .tag-type { background: var(--accent); color: #fff; }
  .tag-genre { background: var(--surface2); color: var(--muted); border: 0.5px solid var(--border); }

  .result-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px; letter-spacing: 0.03em; line-height: 1.05;
    color: var(--text); margin-bottom: 16px;
  }
  .result-link a {
    font-size: 13px; color: var(--accent2); text-decoration: none;
    border-bottom: 0.5px solid rgba(255,107,129,0.3); padding-bottom: 1px;
  }
  .result-link a:hover { border-color: var(--accent2); }
  .no-link { font-size: 13px; color: var(--muted); }

  .placeholder { font-size: 15px; color: var(--muted); font-weight: 300; }
  .spin-strip {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; letter-spacing: 0.03em; color: var(--text);
  }
  .empty-msg { font-size: 14px; color: var(--muted); line-height: 1.6; }

  footer {
    margin-top: 1.25rem; text-align: center;
    font-size: 11px; color: var(--muted); font-weight: 300;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 0.3s ease forwards; }

  .loading-bar {
    width: 100%; height: 2px;
    background: var(--surface2);
    border-radius: 999px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }
  .loading-bar-inner {
    height: 100%; width: 0%;
    background: var(--accent);
    border-radius: 999px;
    animation: loadpulse 1.2s ease-in-out infinite;
  }
  @keyframes loadpulse {
    0% { width: 0%; margin-left: 0%; }
    50% { width: 60%; margin-left: 20%; }
    100% { width: 0%; margin-left: 100%; }
  }
</style>
</head>
<body>
<div class="container">
  <span class="eyebrow">Mnstrworm × Mnstrbait</span>
  <h1>WATCH<br><span class="x">ROULETTE</span></h1>
  <p class="subtitle">Too many options. Let the wheel decide.</p>

  <div id="loading-bar" class="loading-bar"><div class="loading-bar-inner"></div></div>

  <div id="filters" style="display:none;">
    <div class="filter-section">
      <span class="section-label">Type</span>
      <div class="pill-row" id="type-pills">
        <button class="pill active" data-val="all">Anything</button>
        <button class="pill" data-val="Movie">Movie</button>
        <button class="pill" data-val="TV Series">TV Series</button>
      </div>
    </div>

    <div class="filter-section">
      <span class="section-label">Genre</span>
      <div class="pill-row" id="genre-pills">
        <button class="pill active" data-val="all">Anything</button>
      </div>
    </div>
  </div>

  <button class="spin-btn" id="spin-btn" disabled>SPIN</button>

  <div class="slot-machine" id="slot-machine">
    <div class="slot-inner" id="slot-inner">
      <div class="placeholder">Fetching your list...</div>
    </div>
  </div>

  <footer id="footer"></footer>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQoY_-6BFriG-qiK1zvVfg7es6AM9DGgtl-DIFWEimeQCmPYSkrADMHjk4jbh36NRdACurLVPtnx55u/pub?output=csv";

let allTitles = [];
let typeFilter = "all";
let genreFilter = "all";
let spinning = false;

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const results = [];
  // Find header row — look for row containing "Title"
  let dataStart = 2;
  for (let i = 0; i < Math.min(5, lines.length); i++) {
    if (lines[i].toLowerCase().includes('title')) { dataStart = i + 1; break; }
  }
  for (let i = dataStart; i < lines.length; i++) {
    const cols = splitLine(lines[i]);
    const title = clean(cols[1]);
    if (!title) continue;
    const link  = clean(cols[2]);
    const genre = clean(cols[5]);
    const type  = clean(cols[6]);
    results.push({ title, link, genre, type });
  }
  return results;
}

function splitLine(line) {
  const cols = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { cols.push(cur); cur = ''; }
    else { cur += c; }
  }
  cols.push(cur);
  return cols;
}

function clean(s) {
  return s ? s.replace(/^"|"$/g, '').trim() : '';
}

function isURL(s) {
  return s && (s.startsWith('http://') || s.startsWith('https://'));
}

function getPool() {
  return allTitles.filter(t => {
    if (typeFilter !== 'all' && t.type !== typeFilter) return false;
    if (genreFilter !== 'all' && !t.genre.toLowerCase().includes(genreFilter.toLowerCase())) return false;
    return true;
  });
}

function buildGenrePills() {
  const genres = new Set();
  allTitles.forEach(t => {
    if (!t.genre) return;
    t.genre.split(/[\s,]+/).forEach(g => { if (g.trim()) genres.add(g.trim()); });
  });
  const container = document.getElementById('genre-pills');
  container.innerHTML = '<button class="pill active" data-val="all">Anything</button>';
  [...genres].sort().forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'pill';
    btn.dataset.val = g;
    btn.textContent = g;
    container.appendChild(btn);
  });
  container.querySelectorAll('.pill').forEach(p => {
    p.addEventListener('click', () => {
      container.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
      p.classList.add('active');
      genreFilter = p.dataset.val;
      updateFooter();
    });
  });
}

function setupTypePills() {
  document.getElementById('type-pills').querySelectorAll('.pill').forEach(p => {
    p.addEventListener('click', () => {
      document.getElementById('type-pills').querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
      p.classList.add('active');
      typeFilter = p.dataset.val;
      updateFooter();
    });
  });
}

function updateFooter() {
  const pool = getPool();
  document.getElementById('footer').textContent = pool.length + ' titles in pool · ' + allTitles.length + ' total';
}

function showPlaceholder(msg) {
  document.getElementById('slot-inner').innerHTML = '<div class="placeholder">' + msg + '</div>';
  document.getElementById('slot-machine').classList.remove('lit');
}

function showResult(item) {
  const genreTag = item.genre ? '<span class="tag tag-genre">' + item.genre + '</span>' : '';
  const typeTag  = item.type  ? '<span class="tag tag-type">'  + item.type  + '</span>' : '';
  let linkHTML = '';
  if (isURL(item.link)) {
    linkHTML = '<a href="' + item.link + '" target="_blank">Watch now &rarr;</a>';
  } else if (item.link) {
    linkHTML = '<span class="no-link">Watch on: ' + item.link + '</span>';
  } else {
    linkHTML = '<span class="no-link">No link yet</span>';
  }
  document.getElementById('slot-inner').innerHTML =
    '<div class="fade-in">' +
    '<div class="result-tags">' + typeTag + genreTag + '</div>' +
    '<div class="result-title">' + item.title + '</div>' +
    '<div class="result-link">' + linkHTML + '</div>' +
    '</div>';
  document.getElementById('slot-machine').classList.add('lit');
}

function spin() {
  if (spinning) return;
  const pool = getPool();
  if (!pool.length) {
    document.getElementById('slot-inner').innerHTML =
      '<div class="empty-msg">Nothing matches those filters.<br>Try a different type or genre.</div>';
    return;
  }
  spinning = true;
  const btn = document.getElementById('spin-btn');
  btn.disabled = true; btn.textContent = 'SPINNING...';
  const picked = pool[Math.floor(Math.random() * pool.length)];
  const fake = [...allTitles].sort(() => Math.random() - 0.5);
  let ticks = 0; const total = 22;
  function tick() {
    const progress = ticks / total;
    const delay = 50 + (260 - 50) * (progress * progress * progress);
    const f = fake[ticks % fake.length];
    document.getElementById('slot-inner').innerHTML =
      '<div class="spin-strip" style="opacity:' + (0.4 + 0.6 * progress) + '">' + f.title + '</div>';
    document.getElementById('slot-machine').classList.remove('lit');
    ticks++;
    if (ticks <= total) { setTimeout(tick, delay); }
    else {
      showResult(picked);
      spinning = false;
      btn.disabled = false;
      btn.textContent = 'SPIN AGAIN';
    }
  }
  tick();
}

async function loadSheet() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    allTitles = parseCSV(text);
    if (!allTitles.length) throw new Error('No titles found');
    document.getElementById('loading-bar').style.display = 'none';
    document.getElementById('filters').style.display = 'block';
    buildGenrePills();
    setupTypePills();
    updateFooter();
    showPlaceholder('Hit spin and let fate decide.');
    document.getElementById('spin-btn').disabled = false;
  } catch(e) {
    document.getElementById('loading-bar').style.display = 'none';
    showPlaceholder('Could not load sheet \u2014 ' + e.message);
    document.getElementById('footer').textContent = 'Make sure the sheet is published to web';
  }
}

document.getElementById('spin-btn').addEventListener('click', spin);
loadSheet();
</script>
</body>
</html>
